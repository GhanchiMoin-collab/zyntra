<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYNTRA • Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#32206b 0%,transparent 35%),
#080a17;
overflow:hidden;
color:white;
}

.card{
width:420px;
max-width:95%;
background:#121629;
border:1px solid #2d3355;
border-radius:24px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.logo{
width:75px;
height:75px;
margin:auto;
border-radius:22px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
background:linear-gradient(135deg,#8b5cf6,#ec4899);
}

h1{
text-align:center;
margin-top:20px;
font-size:34px;
}

p{
text-align:center;
color:#aab2d8;
margin-top:10px;
margin-bottom:30px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
background:#1d2340;
border:1px solid #333b64;
border-radius:14px;
color:white;
font-size:15px;
outline:none;
}

input:focus{
border-color:#8b5cf6;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#loginBtn{
background:linear-gradient(135deg,#8b5cf6,#ec4899);
color:white;
margin-bottom:12px;
}

#googleBtn{
background:white;
color:black;
}

.small{
margin-top:25px;
font-size:14px;
}

a{
color:#b794ff;
text-decoration:none;
}
.menu-btn{
position:fixed;
top:20px;
left:20px;
width:50px;
height:50px;
border:none;
border-radius:14px;
background:#1d2340;
color:white;
font-size:24px;
cursor:pointer;
z-index:1000;
}

.side-menu{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#121629;
border-right:1px solid #2d3355;
padding:30px;
transition:.3s;
display:flex;
flex-direction:column;
gap:15px;
z-index:999;
}

.side-menu.open{
left:0;
}

.side-menu h2{
margin-bottom:20px;
}

.side-menu button{
padding:15px;
background:#1d2340;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
text-align:left;
}
.close-btn{
background:#8b5cf6;
color:white;
padding:12px;
border:none;
border-radius:12px;
margin-bottom:20px;
cursor:pointer;
font-weight:bold;
}

.menu-btn.hide{
display:none;
}
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
justify-content:center;
align-items:center;
z-index:3000;
}

.popup.show{
display:flex;
}

.popup-box{
width:420px;
max-width:90%;
background:#121629;
padding:30px;
border-radius:22px;
border:1px solid #30385f;
text-align:center;
}

.popup-box h2{
margin-bottom:20px;
}

.popup-box p{
line-height:1.8;
color:#cfd5f7;
}

.popup-box button{
margin-top:20px;
padding:14px 25px;
background:linear-gradient(135deg,#8b5cf6,#ec4899);
border:none;
border-radius:12px;
color:white;
cursor:pointer;
font-weight:bold;
}
</style>

</head>

<body>

<button id="menuBtn" class="menu-btn">☰</button>

<div id="sideMenu" class="side-menu">

<button id="closeMenu" class="close-btn">✖ Close</button>

<h2>ZYNTRA</h2>

<button id="howBtn">📖 How to Login</button>

<button id="guestBtn">👤 Continue as Guest</button>

<button id="featureBtn">⭐ Features</button>

</div>
  
  <div class="card">

<div class="logo">✦</div>

<h1>ZYNTRA</h1>

<p>The Future of Intelligence</p>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">
Login
</button>

<button id="googleBtn">
Continue with Google
</button>

<p class="small">
Don't have an account?
<a href="#" id="signupLink">Create Account</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  
const firebaseConfig = {
apiKey: "AIzaSyAWuJOkwON5KLALez5_p4rQYA7vNoGgjvM",
authDomain: "zyntra-98cad.firebaseapp.com",
projectId: "zyntra-98cad",
storageBucket: "zyntra-98cad.firebasestorage.app",
messagingSenderId: "960720019638",
appId: "1:960720019638:web:3e212b262c672fdd858617"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="one-ai.html";
}
});
document.getElementById("signupLink").onclick = async (e) => {

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(email === "" || password === ""){
    alert("Please enter your email and password first.");
    return;
}

try{

await createUserWithEmailAndPassword(auth, email, password);

alert("🎉 Account created successfully!");

window.location.href = "one-ai.html";

}catch(err){

alert(err.message);

}

};

document.getElementById("loginBtn").onclick=async()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

window.location.href="one-ai.html";

}catch(err){

console.error(err);
alert(err.code + "\n" + err.message);
}

};

document.getElementById("googleBtn").onclick=async()=>{

const provider=new GoogleAuthProvider();

try{

await signInWithPopup(auth,provider);

window.location.href="one-ai.html";

}catch(err){

alert(err.message);

}

};

const menu=document.getElementById("sideMenu");

const menuBtn=document.getElementById("menuBtn");

document.getElementById("menuBtn").onclick=()=>{

menu.classList.add("open");

menuBtn.classList.add("hide");

};

document.getElementById("closeMenu").onclick=()=>{

menu.classList.remove("open");

menuBtn.classList.remove("hide");

};
  
const help=document.getElementById("helpPopup");

document.getElementById("howBtn").onclick=()=>{

help.classList.add("show");

};

document.getElementById("closeHelp").onclick=()=>{

help.classList.remove("show");

};

</script>
<div id="helpPopup" class="popup">

<div class="popup-box">

<h2>📖 How to Login</h2>

<p>

1️⃣ Enter your Email

<br><br>

2️⃣ Enter your Password

<br><br>

3️⃣ If you're new, click
<b>Create Account</b>

<br><br>

4️⃣ If you already have an account,
click <b>Login</b>

<br><br>

5️⃣ Or continue with Google.

</p>

<button id="closeHelp">
OK
</button>

</div>

</div>
</body>
</html>
