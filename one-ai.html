<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>One AI • Your Personal AI Assistant</title>

</head>
  <style>
    :root { --bg:#080a17; --panel:#121629; --line:#272d4b; --text:#f7f7ff; --muted:#a9afcb; --violet:#8b5cf6; --pink:#ec4899; }
    * { box-sizing:border-box; } body { margin:0; color:var(--text); background:radial-gradient(circle at 5% 0%,#271652 0,transparent 30%),var(--bg); font:16px/1.45 Inter,system-ui,-apple-system,Segoe UI,sans-serif; }
    button,input { font:inherit; } button { cursor:pointer; border:0; color:inherit; }
    .shell { max-width:1120px; min-height:100vh; margin:auto; padding:26px 28px 42px; }
    nav { display:flex; align-items:center; justify-content:space-between; gap:18px; } .brand { display:flex; align-items:center; gap:11px; font-weight:800; font-size:21px; letter-spacing:-.4px; }
    .spark { width:40px; height:40px; display:grid; place-items:center; border-radius:13px; background:linear-gradient(135deg,var(--violet),var(--pink)); box-shadow:0 8px 25px #8b5cf655; font-size:20px; }
    .profile { width:37px; height:37px; display:grid; place-items:center; border-radius:50%; background:#252b4a; color:#d7d8f2; }
    .hero { margin:76px 0 42px; max-width:760px; } .eyebrow { color:#c4b5fd; font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:1.4px; }
    h1 { margin:10px 0 16px; max-width:700px; font-size:clamp(39px,6vw,68px); line-height:1.03; letter-spacing:-2.7px; } .gradient { background:linear-gradient(90deg,#c4b5fd,#f9a8d4); -webkit-background-clip:text; color:transparent; }
    .hero p { margin:0; max-width:590px; font-size:18px; color:var(--muted); }
    .quick { margin-top:29px; width:100%; max-width:660px; display:flex; gap:10px; padding:8px; border:1px solid var(--line); border-radius:17px; background:#101428cc; box-shadow:0 15px 35px #0004; }
    .quick input { min-width:0; flex:1; padding:10px 12px; border:0; outline:0; color:white; background:transparent; } .quick button { border-radius:12px; padding:10px 16px; font-weight:750; background:linear-gradient(135deg,var(--violet),#a855f7); }
    .section-title { margin:0 0 15px; font-size:20px; letter-spacing:-.3px; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; } .card { min-height:190px; padding:20px; text-align:left; background:linear-gradient(145deg,#151a31,#101326); border:1px solid var(--line); border-radius:20px; transition:.18s transform,.18s border-color,.18s background; }
    .card:hover { transform:translateY(-4px); border-color:#8b5cf6; background:#191d38; } .icon { width:45px; height:45px; display:grid; place-items:center; border-radius:14px; margin-bottom:30px; font-size:22px; }
    .card h3 { margin:0 0 5px; font-size:17px; }.card p { margin:0; color:var(--muted); font-size:14px; }.chat{background:#8b5cf625}.image{background:#ec489925}.study{background:#3b82f625}.write{background:#f59e0b25}.voice{background:#10b98125}.business{background:#ef444425}
    .modal { position:fixed; inset:0; display:none; place-items:center; padding:20px; background:#02030bb8; backdrop-filter:blur(8px); }.modal.show { display:grid; }.window { width:min(720px,100%); height:min(680px,88vh); display:flex; flex-direction:column; overflow:hidden; border:1px solid #3a3260; border-radius:24px; background:#11152b; box-shadow:0 30px 90px #0009; }.top { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--line); }.top h2 { margin:0; font-size:18px; }.close { width:33px; height:33px; border-radius:50%; background:#282d48; font-size:20px; }
    .messages { flex:1; overflow:auto; padding:25px 20px; }.message { max-width:82%; margin-bottom:15px; padding:12px 15px; border-radius:16px; }.assistant { background:#222843; border-bottom-left-radius:4px; }.user { margin-left:auto; color:white; background:linear-gradient(135deg,#7545e9,#a84be0); border-bottom-right-radius:4px; }.typing { color:var(--muted); font-size:14px; }.suggestions{display:flex;gap:8px;overflow:auto;padding:0 15px 13px}.suggestions button{white-space:nowrap;padding:8px 11px;border-radius:999px;border:1px solid #393f61;background:#1b2038;color:#d9dcf3;font-size:12px}.suggestions button:hover{border-color:#a78bfa;background:#29204b}
    .composer { display:flex; gap:9px; padding:14px; border-top:1px solid var(--line); }.composer input { flex:1; min-width:0; border:1px solid #303658; outline:0; border-radius:13px; padding:12px; color:white; background:#0c1020; }.composer button { border-radius:12px; padding:0 18px; font-weight:750; background:var(--violet); }.composer .mic{width:45px;padding:0;background:#252b47;font-size:18px}.composer .mic.listening{background:#e34b72;animation:pulse 1s infinite}@keyframes pulse{50%{transform:scale(1.07)}}
    footer { margin-top:50px; text-align:center; color:#737a9e; font-size:13px; } @media(max-width:700px){ .shell{padding:20px 16px 36px}.hero{margin:55px 0 36px} h1{letter-spacing:-1.8px}.grid{grid-template-columns:repeat(2,1fr)}.card{min-height:175px;padding:16px}.icon{margin-bottom:24px} } @media(max-width:380px){.grid{grid-template-columns:1fr}.card{min-height:140px}}
  </style>
</head>
<body>
  <main class="shell">
    <nav><div class="brand"><div class="spark">✦</div> One AI</div><button class="profile" title="Profile">◉</button></nav>
    <section class="hero"><div class="eyebrow">One place. Every possibility.</div><h1>Your ideas, <span class="gradient">powered by AI.</span></h1><p>Chat, create images, learn faster, write better, and build your next big idea—all with One AI.</p><form class="quick" id="quickForm"><input id="quickInput" aria-label="Ask One AI" placeholder="Ask One AI anything…"><button>Ask AI →</button></form></section>
    <h2 class="section-title">Explore your tools</h2>
    <section class="grid">
      <button class="card" data-tool="AI Chat"><div class="icon chat">✦</div><h3>AI Chat</h3><p>Ask anything. Get clear answers.</p></button>
      <button class="card" data-tool="Create Image"><div class="icon image">▧</div><h3>Create Image</h3><p>Turn an idea into an image.</p></button>
      <button class="card" data-tool="Study Helper"><div class="icon study">▣</div><h3>Study Helper</h3><p>Learn, explain, and practise.</p></button>
      <button class="card" data-tool="Write Better"><div class="icon write">✎</div><h3>Write Better</h3><p>Draft, rewrite, and translate.</p></button>
      <button class="card" data-tool="Voice Assistant"><div class="icon voice">◉</div><h3>Voice Assistant</h3><p>Speak naturally with One AI.</p></button>
      <button class="card" data-tool="Business Tools"><div class="icon business">▤</div><h3>Business Tools</h3><p>Ideas, plans, and smart tasks.</p></button>
    </section><footer>One AI • Your all-in-one assistant</footer>
  </main>
  <section class="modal" id="modal" aria-hidden="true"><div class="window"><header class="top"><h2 id="toolTitle">AI Chat</h2><button class="close" id="close" aria-label="Close">×</button></header><div class="messages" id="messages"><div class="message assistant">Hi! I’m One AI. How can I help you today?</div></div><div class="suggestions" id="suggestions"></div><form class="composer" id="chatForm"><input id="chatInput" autocomplete="off" placeholder="Message One AI…"><button class="mic" type="button" id="micButton" title="Speak your message" aria-label="Speak your message">◉</button><button>Send</button></form></div></section>
  
  <script>
    const modal=document.querySelector('#modal'), messages=document.querySelector('#messages'), title=document.querySelector('#toolTitle'), chatInput=document.querySelector('#chatInput'), suggestions=document.querySelector('#suggestions');
    const toolSetup={
      'AI Chat':{intro:'Hi! I’m One AI. Ask me anything.',ideas:['Explain a topic simply','Plan my day','Give me an idea']},
      'Create Image':{intro:'Describe the image you want, including style, colours, and details.',ideas:['A futuristic city at night','A logo for One AI','A cute cat astronaut']},
      'Study Helper':{intro:'Tell me what you are studying and I’ll help you learn step by step.',ideas:['Explain photosynthesis','Make a maths quiz','Help with English grammar']},
      'Write Better':{intro:'Paste your writing or tell me what you want to create.',ideas:['Write an email','Improve my paragraph','Translate to Hindi']},
      'Voice Assistant':{intro:'Voice mode is coming next. For now, type what you would like to say.',ideas:['Set a reminder idea','Practise English','Tell me a story']},
      'Business Tools':{intro:'Let’s turn your business idea into a plan.',ideas:['Give me startup ideas','Write a business plan','Create a marketing post']}
    };
    function openChat(tool='AI Chat', first=''){title.textContent=tool;modal.classList.add('show');modal.setAttribute('aria-hidden','false');const setup=toolSetup[tool]||toolSetup['AI Chat'];messages.innerHTML='';add(setup.intro,'assistant');suggestions.innerHTML='';setup.ideas.forEach(idea=>{const button=document.createElement('button');button.textContent=idea;button.onclick=()=>send(idea);suggestions.appendChild(button)});chatInput.focus();if(first)send(first);}
    function add(text,role){
    const el=document.createElement('div');
    el.className='message '+role;
    el.textContent=text;
    messages.appendChild(el);
    messages.scrollTop=messages.scrollHeight;
}{
    const el = document.createElement('div');
    el.className = 'message ' + role;

    const content = document.createElement('div');
    content.textContent = text;
    el.appendChild(content);

    if (role === 'assistant') {
        const copyBtn = document.createElement('button');
        copyBtn.textContent = '📋 Copy';
        copyBtn.style.marginTop = '8px';
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(text);
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => {
                copyBtn.textContent = '📋 Copy';
            }, 2000);
        };
        el.appendChild(copyBtn);
    }

    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
}
    
    async function send(text){
      if(!text.trim())return;
      add(text,'user');
window.lastPrompt = text;
      chatInput.value='';
      const wait=document.createElement('div');
      wait.className='typing';
      wait.textContent='🤖 One AI is thinking...';
      messages.appendChild(wait);
      messages.scrollTop=messages.scrollHeight;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            messages: [{ role: 'user', content: text }] 
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unable to get an answer.');
        
        const aiMessage = data.choices[0].message.content;
        add(aiMessage, 'assistant');
      } catch (error) {
  console.error(error);
  add(`❌ Error: ${error.message}`, 'assistant');
} finally {
        wait.remove();
      }
    }
    
    document.querySelectorAll('[data-tool]').forEach(x=>x.addEventListener('click',()=>openChat(x.dataset.tool))); document.querySelector('#close').onclick=()=>modal.classList.remove('show'); modal.onclick=e=>{if(e.target===modal)modal.classList.remove('show')};
    document.querySelector('#chatForm').onsubmit=e=>{e.preventDefault();send(chatInput.value)}; document.querySelector('#quickForm').onsubmit=e=>{e.preventDefault();const q=document.querySelector('#quickInput').value;openChat('AI Chat',q);document.querySelector('#quickInput').value='';};
    const micButton=document.querySelector('#micButton');
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SpeechRecognition){const recognition=new SpeechRecognition();recognition.lang='en-IN';recognition.interimResults=true;recognition.onstart=()=>{micButton.classList.add('listening');chatInput.placeholder='Listening…'};recognition.onresult=e=>{chatInput.value=Array.from(e.results).map(r=>r[0].transcript).join('')};recognition.onend=()=>{micButton.classList.remove('listening');chatInput.placeholder='Message One AI…'};recognition.onerror=()=>{micButton.classList.remove('listening');chatInput.placeholder='Microphone access was not available.'};micButton.onclick=()=>recognition.start()}else{micButton.onclick=()=>alert('Voice input is supported in Chrome and Microsoft Edge.');}
  </script>
</body>
</html>
